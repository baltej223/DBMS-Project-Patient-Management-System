version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - .env 
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
    networks:
      - mednet
    # command: ["npm", "run", "migrate && npm run start"]
    

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: auth
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - mednet

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: admin
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - mednet
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hospital_management
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mednet

volumes:
  pgdata:

networks:
  mednet:
